<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="personGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGradient)"/>
  
  <!-- Floating circles -->
  <circle cx="100" cy="80" r="20" fill="#6366f1" opacity="0.2"/>
  <circle cx="500" cy="120" r="15" fill="#10b981" opacity="0.3"/>
  <circle cx="80" cy="300" r="25" fill="#f59e0b" opacity="0.2"/>
  <circle cx="520" cy="350" r="18" fill="#ef4444" opacity="0.2"/>
  
  <!-- Main person figure -->
  <g transform="translate(300, 200)">
    <!-- Head -->
    <circle cx="0" cy="-80" r="40" fill="url(#personGradient)"/>
    
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="60" ry="80" fill="url(#personGradient)"/>
    
    <!-- Arms -->
    <ellipse cx="-70" cy="-20" rx="15" ry="50" fill="url(#personGradient)" transform="rotate(-20 -70 -20)"/>
    <ellipse cx="70" cy="-20" rx="15" ry="50" fill="url(#personGradient)" transform="rotate(20 70 -20)"/>
    
    <!-- Legs -->
    <ellipse cx="-25" cy="80" rx="20" ry="60" fill="url(#personGradient)"/>
    <ellipse cx="25" cy="80" rx="20" ry="60" fill="url(#personGradient)"/>
    
    <!-- Heart symbol -->
    <path d="M-30 -60 C-30 -80, -10 -80, -10 -60 C-10 -80, 10 -80, 10 -60 C10 -40, -10 -20, -30 -60 Z" fill="#ef4444" opacity="0.8"/>
    
    <!-- Smile -->
    <path d="M-20 -90 Q0 -70 20 -90" stroke="#ffffff" stroke-width="3" fill="none"/>
    
    <!-- Eyes -->
    <circle cx="-15" cy="-95" r="3" fill="#ffffff"/>
    <circle cx="15" cy="-95" r="3" fill="#ffffff"/>
  </g>
  
  <!-- Supportive elements -->
  <g transform="translate(150, 100)">
    <!-- Chat bubble -->
    <ellipse cx="0" cy="0" rx="40" ry="25" fill="#ffffff" opacity="0.9"/>
    <path d="M-20 20 L-10 30 L0 20" fill="#ffffff" opacity="0.9"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6366f1">💬</text>
  </g>
  
  <g transform="translate(450, 150)">
    <!-- Heart -->
    <path d="M0 -15 C0 -25, -10 -25, -10 -15 C-10 -25, -20 -25, -20 -15 C-20 -5, 0 15, 0 15 C0 15, 20 -5, 20 -15 C20 -25, 10 -25, 10 -15 C10 -25, 0 -25, 0 -15 Z" fill="#ef4444" opacity="0.8"/>
  </g>
  
  <!-- Text elements -->
  <text x="300" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1f2937">Mental Health Support</text>
  <text x="300" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#6b7280">You're not alone in your journey</text>
</svg>
