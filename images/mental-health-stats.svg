<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chartGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1f2937">Mental Health Statistics</text>
  <text x="400" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#6b7280">Understanding the scope of mental health challenges</text>
  
  <!-- Chart 1: People affected by mental health issues -->
  <g transform="translate(100, 120)">
    <rect x="0" y="0" width="200" height="300" fill="url(#chartGradient1)" rx="10"/>
    <text x="100" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2937">1 in 4 People</text>
    <text x="100" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Affected by mental health issues</text>
    
    <!-- Pie chart representation -->
    <circle cx="100" cy="150" r="60" fill="#ffffff" opacity="0.9"/>
    <path d="M100 90 A60 60 0 0 1 100 210 A60 60 0 0 1 100 90 Z" fill="#6366f1" opacity="0.8"/>
    <path d="M100 90 A60 60 0 1 1 100 210 A60 60 0 0 1 100 90 Z" fill="#e5e7eb"/>
    <text x="100" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1f2937">25%</text>
  </g>
  
  <!-- Chart 2: Age of onset -->
  <g transform="translate(300, 120)">
    <rect x="0" y="0" width="200" height="300" fill="url(#chartGradient2)" rx="10"/>
    <text x="100" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2937">50% by Age 14</text>
    <text x="100" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Mental health conditions begin</text>
    
    <!-- Bar chart representation -->
    <rect x="20" y="200" width="160" height="80" fill="#ffffff" opacity="0.9" rx="5"/>
    <rect x="30" y="220" width="30" height="60" fill="#10b981"/>
    <rect x="70" y="200" width="30" height="80" fill="#10b981"/>
    <rect x="110" y="180" width="30" height="100" fill="#10b981"/>
    <rect x="150" y="160" width="30" height="120" fill="#10b981"/>
    
    <text x="45" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">0-5</text>
    <text x="85" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">6-10</text>
    <text x="125" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">11-14</text>
    <text x="165" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">15+</text>
  </g>
  
  <!-- Chart 3: People who don't seek help -->
  <g transform="translate(500, 120)">
    <rect x="0" y="0" width="200" height="300" fill="url(#chartGradient3)" rx="10"/>
    <text x="100" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2937">70% Don't Seek Help</text>
    <text x="100" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">People with mental health issues</text>
    
    <!-- Donut chart representation -->
    <circle cx="100" cy="150" r="60" fill="#ffffff" opacity="0.9"/>
    <circle cx="100" cy="150" r="40" fill="#f8fafc"/>
    <path d="M100 90 A60 60 0 1 1 100 210 A60 60 0 0 1 100 90 Z" fill="#f59e0b" opacity="0.8"/>
    <path d="M100 90 A60 60 0 0 1 100 210 A60 60 0 0 1 100 90 Z" fill="#e5e7eb"/>
    <text x="100" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1f2937">70%</text>
  </g>
  
  <!-- Key insights -->
  <g transform="translate(50, 480)">
    <rect x="0" y="0" width="700" height="100" fill="#ffffff" rx="10" stroke="#e5e7eb" stroke-width="1"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1f2937">Key Insights:</text>
    <text x="20" y="45" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">• Mental health affects 1 in 4 people globally</text>
    <text x="20" y="65" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">• Early intervention is crucial - 50% of conditions begin by age 14</text>
    <text x="20" y="85" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">• 70% of people with mental health issues don't seek professional help</text>
  </g>
  
  <!-- Call to action -->
  <g transform="translate(300, 550)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6366f1">Seek help. You're not alone.</text>
  </g>
</svg>
