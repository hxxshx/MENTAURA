<svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="botGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="75" cy="75" r="75" fill="url(#botGradient)"/>
  
  <!-- Robot head -->
  <g transform="translate(75, 75)">
    <!-- Main body -->
    <rect x="-30" y="-25" width="60" height="50" fill="#ffffff" opacity="0.9" rx="10"/>
    
    <!-- Antenna -->
    <line x1="0" y1="-25" x2="0" y2="-40" stroke="#ffffff" stroke-width="3"/>
    <circle cx="0" cy="-40" r="5" fill="#ffffff"/>
    
    <!-- Eyes -->
    <circle cx="-15" cy="-10" r="8" fill="#10b981"/>
    <circle cx="15" cy="-10" r="8" fill="#10b981"/>
    <circle cx="-15" cy="-10" r="4" fill="#ffffff"/>
    <circle cx="15" cy="-10" r="4" fill="#ffffff"/>
    
    <!-- Mouth -->
    <rect x="-10" y="5" width="20" height="8" fill="#10b981" rx="4"/>
    <rect x="-8" y="7" width="4" height="4" fill="#ffffff" rx="2"/>
    <rect x="-2" y="7" width="4" height="4" fill="#ffffff" rx="2"/>
    <rect x="4" y="7" width="4" height="4" fill="#ffffff" rx="2"/>
    
    <!-- Arms -->
    <rect x="-40" y="-15" width="15" height="30" fill="#ffffff" opacity="0.9" rx="7"/>
    <rect x="25" y="-15" width="15" height="30" fill="#ffffff" opacity="0.9" rx="7"/>
    
    <!-- Hands -->
    <circle cx="-32" cy="0" r="8" fill="#ffffff" opacity="0.9"/>
    <circle cx="32" cy="0" r="8" fill="#ffffff" opacity="0.9"/>
  </g>
  
  <!-- Chat bubble -->
  <g transform="translate(75, 75)">
    <ellipse cx="0" cy="40" rx="25" ry="15" fill="#ffffff" opacity="0.9"/>
    <path d="M-10 50 L-5 60 L0 50" fill="#ffffff" opacity="0.9"/>
    <text x="0" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#10b981">Hi!</text>
  </g>
</svg>
