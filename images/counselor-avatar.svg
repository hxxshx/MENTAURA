<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="avatarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#avatarGradient)"/>
  
  <!-- Person figure -->
  <g transform="translate(100, 100)">
    <!-- Head -->
    <circle cx="0" cy="-30" r="25" fill="#ffffff" opacity="0.9"/>
    
    <!-- Body -->
    <ellipse cx="0" cy="10" rx="35" ry="45" fill="#ffffff" opacity="0.9"/>
    
    <!-- Arms -->
    <ellipse cx="-40" cy="0" rx="12" ry="35" fill="#ffffff" opacity="0.9" transform="rotate(-20 -40 0)"/>
    <ellipse cx="40" cy="0" rx="12" ry="35" fill="#ffffff" opacity="0.9" transform="rotate(20 40 0)"/>
    
    <!-- Legs -->
    <ellipse cx="-15" cy="55" rx="12" ry="30" fill="#ffffff" opacity="0.9"/>
    <ellipse cx="15" cy="55" rx="12" ry="30" fill="#ffffff" opacity="0.9"/>
    
    <!-- Face features -->
    <circle cx="-8" cy="-35" r="3" fill="#6366f1"/>
    <circle cx="8" cy="-35" r="3" fill="#6366f1"/>
    <path d="M-10 -25 Q0 -20 10 -25" stroke="#6366f1" stroke-width="2" fill="none"/>
    
    <!-- Professional elements -->
    <rect x="-20" y="-15" width="40" height="25" fill="#6366f1" opacity="0.3" rx="5"/>
    <path d="M-15 -10 L15 -10 L15 5 L-15 5 Z" fill="#ffffff" opacity="0.8"/>
  </g>
  
  <!-- Professional icon -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="-60" r="15" fill="#ffffff" opacity="0.9"/>
    <path d="M-8 -60 L8 -60 L8 -50 L-8 -50 Z" fill="#6366f1"/>
    <path d="M-5 -55 L5 -55 L5 -50 L-5 -50 Z" fill="#ffffff"/>
  </g>
</svg>
