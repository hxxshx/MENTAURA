<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotional Wellness Fish - Underwater Journey</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #FF9A8B 0%, #FECFEF 15%, #FECFEF 25%, #A8E6CF 35%, #88D8C0 45%, #FFECD2 55%, #FCB69F 65%, #FFD1FF 75%, #E0BBE4 85%, #C7CEEA 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            position: relative;
            padding: 0.5vh;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 179, 209, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(200, 178, 219, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(168, 230, 207, 0.2) 0%, transparent 50%);
            pointer-events: none;
        }

        h1 {
            color: #2d3436;
            text-shadow: 4px 4px 14px rgba(255,255,255,1), -1px -1px 7px rgba(0,0,0,0.4);
            margin: 0.5vh 0;
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-weight: 900;
            background: linear-gradient(135deg, #7f5fff, #ff4081, #ffd54f, #00e676);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            letter-spacing: 1px;
            filter: drop-shadow(3px 3px 5px rgba(255,255,255,0.8));
            flex-shrink: 0;
        }

        .instructions {
            color: #2d3436;
            text-align: center;
            margin: 0.3vh 0;
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            font-weight: 700;
            text-shadow: 2px 2px 6px rgba(255,255,255,0.8);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.85), rgba(255, 245, 238, 0.8));
            padding: 0.5vh 1vw;
            border-radius: 15px;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(253, 121, 168, 0.2);
            box-shadow: 0 4px 15px rgba(253, 121, 168, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            flex-shrink: 0;
        }

        .gameInfo {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 95vw;
            margin: 0.5vh 0;
            color: #2d3436;
            font-weight: 900;
            flex-wrap: wrap;
            gap: 0.5vw;
            flex-shrink: 0;
        }

        #score, #emotionsLeft, #playerSize, #wellness {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 245, 238, 0.95));
            backdrop-filter: blur(15px);
            padding: 0.5vh 1vw;
            border-radius: 15px;
            border: 2px solid rgba(108, 92, 231, 0.3);
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            text-shadow: 1px 1px 3px rgba(255,255,255,0.8);
            font-size: clamp(0.7rem, 1.8vw, 1rem);
            transition: all 0.3s ease;
            flex: 1;
            text-align: center;
            min-width: 0;
        }

        #wellness {
            background: linear-gradient(135deg, rgba(255, 179, 209, 0.95), rgba(255, 192, 203, 0.9));
            border-color: rgba(253, 121, 168, 0.4);
            color: #2d3436;
        }

        #positiveCount {
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255, 235, 59, 0.2));
            border-color: rgba(255,255,255,0.9);
            color: #2d3436;
        }

        .game-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            flex: 1;
            min-height: 0;
            gap: 1vw;
        }

        canvas {
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            box-shadow: 0 6px 30px rgba(177, 156, 217, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.1);
            background: linear-gradient(180deg, rgba(135, 206, 235, 0.8) 0%, rgba(100, 149, 237, 0.9) 30%, rgba(65, 105, 225, 0.95) 70%, rgba(25, 25, 112, 1) 100%);
            backdrop-filter: blur(10px);
            max-width: 65vw;
            max-height: 65vh;
        }

        #controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 0.5vw;
            width: min(25vw, 200px);
            height: min(25vw, 200px);
            flex-shrink: 0;
        }

        .control-btn {
            border: none;
            border-radius: min(2vw, 15px);
            background: linear-gradient(145deg, rgba(168, 230, 207, 0.9), rgba(136, 216, 192, 0.85));
            color: #2d3436;
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(0, 184, 148, 0.2);
            text-shadow: 1px 1px 3px rgba(255,255,255,0.8);
            min-height: 44px;
            min-width: 44px;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 184, 148, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            background: linear-gradient(145deg, rgba(168, 230, 207, 1), rgba(136, 216, 192, 0.95));
        }

        .control-btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 10px rgba(0, 184, 148, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }

        #upBtn {
            grid-column: 2;
            grid-row: 1;
        }

        #leftBtn {
            grid-column: 1;
            grid-row: 2;
        }

        #stopBtn {
            grid-column: 2;
            grid-row: 2;
            background: linear-gradient(145deg, rgba(255, 107, 107, 0.9), rgba(255, 118, 117, 0.85));
            border-color: rgba(231, 76, 60, 0.3);
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        #rightBtn {
            grid-column: 3;
            grid-row: 2;
        }

        #downBtn {
            grid-column: 2;
            grid-row: 3;
        }

        #stopBtn:hover {
            background: linear-gradient(145deg, rgba(255, 107, 107, 1), rgba(255, 118, 117, 0.95));
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 245, 238, 0.9));
            backdrop-filter: blur(20px);
            color: #2d3436;
            padding: 3vh 4vw;
            border-radius: 20px;
            text-align: center;
            border: 3px solid rgba(108, 92, 231, 0.3);
            box-shadow: 0 10px 40px rgba(108, 92, 231, 0.4), inset 0 1px 0 rgba(255, 255, 255, 1);
            display: none;
            max-width: 80vw;
            max-height: 80vh;
            font-weight: 700;
            z-index: 1000;
            overflow-y: auto;
        }

        .game-over h2 {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            margin-bottom: 1vh;
        }

        .game-over p {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            margin: 1vh 0;
        }

        .restart-btn {
            background: linear-gradient(145deg, rgba(0, 184, 148, 0.9), rgba(0, 150, 136, 0.8));
            color: white;
            border: 2px solid rgba(0, 184, 148, 0.3);
            padding: 1.5vh 3vw;
            border-radius: 15px;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            cursor: pointer;
            margin-top: 2vh;
            font-weight: 900;
            box-shadow: 0 6px 20px rgba(0, 184, 148, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 184, 148, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            background: linear-gradient(145deg, rgba(0, 184, 148, 1), rgba(0, 150, 136, 0.9));
        }

        /* Mobile Layout Adjustments */
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                gap: 1vh;
            }

            canvas {
                max-width: 95vw;
                max-height: 50vh;
            }

            #controls {
                width: min(50vw, 250px);
                height: min(30vh, 180px);
            }

            .gameInfo {
                font-size: clamp(0.6rem, 1.5vw, 0.8rem);
            }

            h1 {
                font-size: clamp(1rem, 4vw, 1.5rem);
            }

            .instructions {
                font-size: clamp(0.6rem, 1.8vw, 0.8rem);
                padding: 0.3vh 1vw;
            }
        }

        @media (max-height: 600px) {
            h1 {
                margin: 0.2vh 0;
                font-size: clamp(1rem, 2.5vh, 1.5rem);
            }

            .instructions {
                margin: 0.2vh 0;
                padding: 0.3vh 1vw;
                font-size: clamp(0.6rem, 1.5vh, 0.8rem);
            }

            .gameInfo {
                margin: 0.3vh 0;
            }

            canvas {
                max-height: 45vh;
            }

            #controls {
                height: min(25vh, 150px);
                width: min(25vh, 150px);
            }
        }

        /* Ultra-wide and landscape mobile */
        @media (orientation: landscape) and (max-height: 500px) {
            .game-container {
                flex-direction: row;
                gap: 2vw;
            }

            canvas {
                max-width: 60vw;
                max-height: 60vh;
            }

            #controls {
                width: min(20vw, 150px);
                height: min(20vw, 150px);
            }

            h1, .instructions {
                font-size: clamp(0.8rem, 2.5vh, 1.2rem);
                margin: 0.2vh 0;
            }
        }

        /* Animation for floating effect */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-3px); }
        }

        .gameInfo > div {
            animation: float 3s ease-in-out infinite;
        }

        .gameInfo > div:nth-child(2) {
            animation-delay: 0.5s;
        }

        .gameInfo > div:nth-child(3) {
            animation-delay: 1s;
        }

        .gameInfo > div:nth-child(4) {
            animation-delay: 1.5s;
        }
    </style>
</head>
<body>
    <h1>🐠 Emotional Wellness Fish</h1>
    <div class="instructions">Collect positive emotions to grow and win! Avoid negative ones or your fish will shrink!</div>
    
    <div class="gameInfo">
        <div id="score">Score: 0</div>
        <div id="positiveCount">Positive Left: 8</div>
        <div id="playerSize">Size: 30</div>
        <div id="wellness">Wellness: 100</div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        <div id="controls">
            <button id="upBtn" class="control-btn" onclick="moveFish('up')">▲</button>
            <button id="leftBtn" class="control-btn" onclick="moveFish('left')">◄</button>
            <button id="stopBtn" class="control-btn" onclick="stopFish()">⬛</button>
            <button id="rightBtn" class="control-btn" onclick="moveFish('right')">►</button>
            <button id="downBtn" class="control-btn" onclick="moveFish('down')">▼</button>
        </div>
    </div>

    <div id="gameOverScreen" class="game-over">
        <h2 id="gameOverText">Game Complete!</h2>
        <p id="finalScore">Final Score: 0</p>
        <p id="wellnessMessage">Your emotional journey has ended.</p>
        <button class="restart-btn" onclick="restartGame()">🌊 New Journey</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Resize canvas to fit container while maintaining aspect ratio
        function resizeCanvas() {
            const container = canvas.parentElement;
            const containerRect = container.getBoundingClientRect();
            const maxWidth = Math.min(containerRect.width * 0.65, window.innerWidth * 0.65);
            const maxHeight = Math.min(containerRect.height * 0.9, window.innerHeight * 0.65);
            
            const aspectRatio = 600 / 400; // Original canvas ratio
            
            let newWidth = maxWidth;
            let newHeight = newWidth / aspectRatio;
            
            if (newHeight > maxHeight) {
                newHeight = maxHeight;
                newWidth = newHeight * aspectRatio;
            }
            
            canvas.style.width = newWidth + 'px';
            canvas.style.height = newHeight + 'px';
        }

        // Call resize on load and window resize
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let gameState = {
            score: 0,
            wellness: 100,
            positiveEmotionsLeft: 8,
            gameRunning: true
        };

        let fish = {
            x: 100,
            y: 200,
            size: 30,
            dx: 0,
            dy: 0,
            targetDx: 0,
            targetDy: 0,
            color: '#FF6B35',
            tailOffset: 0,
            minSize: 15,
            maxSize: 60
        };

        let emotions = [];
        let bubbles = [];
        let seaweed = [];

        // Positive and negative emotion words
        const positiveEmotions = [
            {word: 'JOY', color: '#FFD700'},
            {word: 'LOVE', color: '#FF69B4'},
            {word: 'PEACE', color: '#87CEEB'},
            {word: 'HOPE', color: '#98FB98'},
            {word: 'CALM', color: '#B0E0E6'},
            {word: 'HAPPY', color: '#FFA500'},
            {word: 'GRATITUDE', color: '#DDA0DD'},
            {word: 'COURAGE', color: '#F0E68C'}
        ];

        const negativeEmotions = [
            {word: 'ANXIETY', color: '#FF4500'},
            {word: 'FEAR', color: '#8B0000'},
            {word: 'ANGER', color: '#DC143C'},
            {word: 'SADNESS', color: '#4169E1'},
            {word: 'WORRY', color: '#CD853F'},
            {word: 'STRESS', color: '#B22222'}
        ];

        function initEmotions() {
            emotions = [];
            
            // Add positive emotions (8)
            positiveEmotions.forEach(emotion => {
                emotions.push({
                    x: Math.random() * (canvas.width - 120) + 60,
                    y: Math.random() * (canvas.height - 100) + 50,
                    word: emotion.word,
                    color: emotion.color,
                    type: 'positive',
                    radius: 25,
                    pulse: Math.random() * Math.PI * 2,
                    dx: (Math.random() - 0.5) * 1,
                    dy: (Math.random() - 0.5) * 1,
                    glowIntensity: 0
                });
            });

            // Add negative emotions (4)
            for (let i = 0; i < 4; i++) {
                const emotion = negativeEmotions[i % negativeEmotions.length];
                emotions.push({
                    x: Math.random() * (canvas.width - 120) + 60,
                    y: Math.random() * (canvas.height - 100) + 50,
                    word: emotion.word,
                    color: emotion.color,
                    type: 'negative',
                    radius: 25,
                    pulse: Math.random() * Math.PI * 2,
                    dx: (Math.random() - 0.5) * 1,
                    dy: (Math.random() - 0.5) * 1,
                    glowIntensity: 0
                });
            }
        }

        function initSeaweed() {
            seaweed = [];
            for (let i = 0; i < 8; i++) {
                seaweed.push({
                    x: Math.random() * canvas.width,
                    height: Math.random() * 80 + 60,
                    segments: Math.floor(Math.random() * 3) + 4,
                    sway: Math.random() * 0.02 + 0.01,
                    offset: Math.random() * Math.PI * 2
                });
            }
        }

        function initBubbles() {
            bubbles = [];
            for (let i = 0; i < 15; i++) {
                bubbles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 8 + 3,
                    speed: Math.random() * 1 + 0.5,
                    opacity: Math.random() * 0.6 + 0.2
                });
            }
        }

        function drawRealisticSeaweed() {
            const time = Date.now() * 0.001;
            
            seaweed.forEach(plant => {
                const segmentHeight = plant.height / plant.segments;
                let currentX = plant.x;
                let currentY = canvas.height;

                for (let i = 0; i < plant.segments; i++) {
                    const swayAmount = Math.sin(time * plant.sway + plant.offset + i * 0.5) * (10 + i * 2);
                    const nextX = plant.x + swayAmount;
                    const nextY = currentY - segmentHeight;

                    const gradient = ctx.createLinearGradient(currentX, currentY, nextX, nextY);
                    gradient.addColorStop(0, '#1B5E20');
                    gradient.addColorStop(0.5, '#2E7D32');
                    gradient.addColorStop(1, '#4CAF50');

                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = 6 - i * 0.5;
                    ctx.lineCap = 'round';

                    ctx.beginPath();
                    ctx.moveTo(currentX, currentY);
                    ctx.quadraticCurveTo(
                        (currentX + nextX) / 2 + Math.sin(time * 2 + i) * 3,
                        (currentY + nextY) / 2,
                        nextX, nextY
                    );
                    ctx.stroke();

                    currentX = nextX;
                    currentY = nextY;
                }
            });
        }

        function drawBubbles() {
            bubbles.forEach((bubble, index) => {
                bubble.y -= bubble.speed;
                bubble.x += Math.sin(Date.now() * 0.001 + index) * 0.5;

                if (bubble.y < -bubble.size) {
                    bubble.y = canvas.height + bubble.size;
                    bubble.x = Math.random() * canvas.width;
                }

                ctx.save();
                ctx.globalAlpha = bubble.opacity;

                const gradient = ctx.createRadialGradient(
                    bubble.x, bubble.y, 0,
                    bubble.x, bubble.y, bubble.size
                );
                gradient.addColorStop(0, 'rgba(173, 216, 230, 0.8)');
                gradient.addColorStop(0.7, 'rgba(135, 206, 250, 0.4)');
                gradient.addColorStop(1, 'rgba(100, 149, 237, 0.1)');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(bubble.x, bubble.y, bubble.size, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.beginPath();
                ctx.arc(bubble.x - bubble.size * 0.3, bubble.y - bubble.size * 0.3, bubble.size * 0.2, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            });
        }

        function drawEmotion(emotion) {
            const time = Date.now() * 0.003;
            emotion.pulse += 0.05;

            // Move emotion slowly
            emotion.x += emotion.dx;
            emotion.y += emotion.dy;

            // Boundary bounce
            if (emotion.x < emotion.radius || emotion.x > canvas.width - emotion.radius) {
                emotion.dx *= -1;
            }
            if (emotion.y < emotion.radius || emotion.y > canvas.height - emotion.radius) {
                emotion.dy *= -1;
            }

            // Pulsing effect
            const pulseSize = emotion.radius + Math.sin(emotion.pulse) * 3;

            ctx.save();

            // Glow effect
            if (emotion.type === 'positive') {
                ctx.shadowColor = emotion.color;
                ctx.shadowBlur = 15 + Math.sin(time + emotion.pulse) * 5;
            } else {
                ctx.shadowColor = '#FF0000';
                ctx.shadowBlur = 10 + Math.sin(time + emotion.pulse) * 3;
            }

            // Circle background
            const gradient = ctx.createRadialGradient(
                emotion.x, emotion.y, 0,
                emotion.x, emotion.y, pulseSize
            );

            if (emotion.type === 'positive') {
                gradient.addColorStop(0, emotion.color);
                gradient.addColorStop(0.7, emotion.color + '80');
                gradient.addColorStop(1, emotion.color + '20');
            } else {
                gradient.addColorStop(0, emotion.color);
                gradient.addColorStop(0.7, emotion.color + '60');
                gradient.addColorStop(1, emotion.color + '10');
            }

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(emotion.x, emotion.y, pulseSize, 0, Math.PI * 2);
            ctx.fill();

            // Border
            ctx.strokeStyle = emotion.type === 'positive' ? '#FFFFFF' : '#000000';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.restore();

            // Text
            ctx.save();
            ctx.fillStyle = emotion.type === 'positive' ? '#000000' : '#FFFFFF';
            ctx.font = `bold ${Math.min(14, emotion.word.length > 6 ? 10 : 14)}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Text shadow for readability
            ctx.shadowColor = emotion.type === 'positive' ? '#FFFFFF' : '#000000';
            ctx.shadowBlur = 3;

            ctx.fillText(emotion.word, emotion.x, emotion.y);
            ctx.restore();
        }

        function drawRealisticFish(x, y, size, color, flipX = false, isPlayer = false) {
            ctx.save();

            if (flipX) {
                ctx.scale(-1, 1);
                x = -x;
            }

            // Fish body gradient
            const bodyGradient = ctx.createRadialGradient(x, y, 0, x, y, size);
            bodyGradient.addColorStop(0, color);
            bodyGradient.addColorStop(0.7, color);
            bodyGradient.addColorStop(1, shadeColor(color, -30));

            // Main body
            ctx.fillStyle = bodyGradient;
            ctx.beginPath();
            ctx.ellipse(x, y, size * 0.8, size * 0.5, 0, 0, Math.PI * 2);
            ctx.fill();

            // Body outline
            ctx.strokeStyle = shadeColor(color, -40);
            ctx.lineWidth = 2;
            ctx.stroke();

            // Tail with animation for player
            const tailSize = size * 0.6;
            const tailGradient = ctx.createLinearGradient(
                x - size, y - tailSize,
                x - size, y + tailSize
            );
            tailGradient.addColorStop(0, color);
            tailGradient.addColorStop(1, shadeColor(color, -20));

            ctx.fillStyle = tailGradient;
            ctx.beginPath();
            
            if (isPlayer) {
                const tailWave = Math.sin(Date.now() * 0.01) * 5;
                ctx.moveTo(x - size * 0.8, y);
                ctx.lineTo(x - size * 1.3, y - tailSize + tailWave);
                ctx.lineTo(x - size * 1.5, y + tailWave);
                ctx.lineTo(x - size * 1.3, y + tailSize + tailWave);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }

            // Fins
            ctx.fillStyle = shadeColor(color, -15);
            ctx.beginPath();
            ctx.ellipse(x - size * 0.3, y - size * 0.4, size * 0.3, size * 0.15, -0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x - size * 0.2, y + size * 0.35, size * 0.25, size * 0.12, 0.5, 0, Math.PI * 2);
            ctx.fill();

            // Eye
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(x + size * 0.2, y - size * 0.1, size * 0.15, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(x + size * 0.25, y - size * 0.1, size * 0.08, 0, Math.PI * 2);
            ctx.fill();

            // Eye highlight
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(x + size * 0.28, y - size * 0.12, size * 0.03, 0, Math.PI * 2);
            ctx.fill();

            // Mouth
            ctx.strokeStyle = shadeColor(color, -50);
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x + size * 0.6, y + size * 0.05, size * 0.1, 0, Math.PI);
            ctx.stroke();

            ctx.restore();
        }

        function shadeColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return '#' + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 + 
                          (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 + 
                          (B < 255 ? B < 1 ? 0 : B : 255)).toString(16).slice(1);
        }

        // Audio context for sound effects
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playPositiveSound() {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(523, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(784, audioContext.currentTime + 0.3);
            
            gainNode.gain.setValueAtTime(0.7, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        function playNegativeSound() {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.4);
            
            gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.4);
        }

        function update() {
            if (!gameState.gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBubbles();
            drawRealisticSeaweed();

            // Smooth fish movement
            fish.dx = lerp(fish.dx, fish.targetDx, 0.1);
            fish.dy = lerp(fish.dy, fish.targetDy, 0.1);

            fish.x += fish.dx;
            fish.y += fish.dy;

            // Boundaries
            if (fish.x < fish.size) {
                fish.x = fish.size;
                fish.targetDx = 0;
            }
            if (fish.y < fish.size + 2) {
                fish.y = fish.size + 2;
                fish.targetDy = 0;
            }
            if (fish.x > canvas.width - fish.size) {
                fish.x = canvas.width - fish.size;
                fish.targetDx = 0;
            }
            if (fish.y > canvas.height - fish.size - 2) {
                fish.y = canvas.height - fish.size - 2;
                fish.targetDy = 0;
            }

            // Update fish color based on wellness
            if (gameState.wellness > 70) {
                fish.color = '#FF6B35'; // Orange - healthy
            } else if (gameState.wellness > 40) {
                fish.color = '#FFA500'; // Yellow - okay
            } else {
                fish.color = '#FF4500'; // Red - struggling
            }

            drawRealisticFish(fish.x, fish.y, fish.size, fish.color, fish.dx < 0, true);

            // Draw and update emotions
            for (let i = emotions.length - 1; i >= 0; i--) {
                const emotion = emotions[i];
                drawEmotion(emotion);

                // Collision detection
                const dist = Math.hypot(fish.x - emotion.x, fish.y - emotion.y);
                if (dist < fish.size * 0.8 + emotion.radius) {
                    if (emotion.type === 'positive') {
                        // Positive emotion - fish grows, wellness increases
                        playPositiveSound();
                        fish.size = Math.min(fish.maxSize, fish.size + 4);
                        gameState.score += 150;
                        gameState.wellness = Math.min(100, gameState.wellness + 15);
                        gameState.positiveEmotionsLeft--;
                        createPositiveEffect(emotion.x, emotion.y);
                    } else {
                        // Negative emotion - fish shrinks, wellness decreases
                        playNegativeSound();
                        fish.size = Math.max(fish.minSize, fish.size - 3);
                        gameState.score = Math.max(0, gameState.score - 75);
                        gameState.wellness = Math.max(0, gameState.wellness - 20);
                        createNegativeEffect(emotion.x, emotion.y);
                    }

                    emotions.splice(i, 1);
                    updateUI();
                }
            }

            // Check end conditions
            if (gameState.positiveEmotionsLeft <= 0) {
                endGame('victory');
                return;
            }

            if (gameState.wellness <= 0 || fish.size <= fish.minSize) {
                endGame('defeat');
                return;
            }

            requestAnimationFrame(update);
        }

        function createPositiveEffect(x, y) {
            for (let i = 0; i < 12; i++) {
                const particle = {
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 40,
                    maxLife: 40,
                    color: '#FFD700'
                };

                const animateParticle = () => {
                    if (particle.life <= 0) return;

                    ctx.save();
                    ctx.globalAlpha = particle.life / particle.maxLife;
                    ctx.fillStyle = particle.color;
                    ctx.beginPath();
                    ctx.arc(particle.x, particle.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();

                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    particle.vy -= 0.1; // Gravity
                    particle.life--;

                    if (particle.life > 0) {
                        requestAnimationFrame(animateParticle);
                    }
                };

                animateParticle();
            }
        }

        function createNegativeEffect(x, y) {
            for (let i = 0; i < 8; i++) {
                const particle = {
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 30,
                    maxLife: 30,
                    color: '#8B0000'
                };

                const animateParticle = () => {
                    if (particle.life <= 0) return;

                    ctx.save();
                    ctx.globalAlpha = particle.life / particle.maxLife;
                    ctx.fillStyle = particle.color;
                    ctx.beginPath();
                    ctx.arc(particle.x, particle.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();

                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    particle.life--;

                    if (particle.life > 0) {
                        requestAnimationFrame(animateParticle);
                    }
                };

                animateParticle();
            }
        }

        function lerp(start, end, factor) {
            return start + (end - start) * factor;
        }

        function moveFish(dir) {
            const speed = 4;
            switch(dir) {
                case 'up':
                    fish.targetDy = -speed;
                    fish.targetDx *= 0.7;
                    break;
                case 'down':
                    fish.targetDy = speed;
                    fish.targetDx *= 0.7;
                    break;
                case 'left':
                    fish.targetDx = -speed;
                    fish.targetDy *= 0.7;
                    break;
                case 'right':
                    fish.targetDx = speed;
                    fish.targetDy *= 0.7;
                    break;
            }
        }

        function stopFish() {
            fish.targetDx = 0;
            fish.targetDy = 0;
        }

        function updateUI() {
            document.getElementById('score').textContent = `Score: ${gameState.score}`;
            document.getElementById('positiveCount').textContent = `Positive Left: ${gameState.positiveEmotionsLeft}`;
            document.getElementById('playerSize').textContent = `Size: ${Math.floor(fish.size)}`;
            document.getElementById('wellness').textContent = `Wellness: ${Math.floor(gameState.wellness)}`;
        }

        function endGame(reason) {
            gameState.gameRunning = false;
            
            const gameOverScreen = document.getElementById('gameOverScreen');
            const gameOverText = document.getElementById('gameOverText');
            const finalScore = document.getElementById('finalScore');
            const wellnessMessage = document.getElementById('wellnessMessage');

            if (reason === 'victory') {
                gameOverText.textContent = '🎉 Victory! All Positive Emotions Collected!';
                wellnessMessage.textContent = `Congratulations! You successfully focused on positivity and achieved ${Math.floor(gameState.wellness)}% wellness!`;
            } else if (reason === 'defeat') {
                gameOverText.textContent = '📚 Learning Experience';
                wellnessMessage.textContent = 'Sometimes we encounter challenges. Remember that avoiding negative thoughts while seeking positive ones is a healthy approach!';
            }

            finalScore.textContent = `Final Score: ${gameState.score}`;
            gameOverScreen.style.display = 'block';
        }

        function restartGame() {
            gameState = {
                score: 0,
                wellness: 100,
                positiveEmotionsLeft: 8,
                gameRunning: true
            };

            fish = {
                x: 100,
                y: 200,
                size: 30,
                dx: 0,
                dy: 0,
                targetDx: 0,
                targetDy: 0,
                color: '#FF6B35',
                tailOffset: 0,
                minSize: 15,
                maxSize: 60
            };

            document.getElementById('gameOverScreen').style.display = 'none';
            
            initEmotions();
            initBubbles();
            initSeaweed();
            updateUI();
            update();
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!gameState.gameRunning) return;

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    moveFish('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    moveFish('down');
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    moveFish('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    moveFish('right');
                    break;
                case ' ':
                    e.preventDefault();
                    stopFish();
                    break;
            }
        });

        // Touch controls for mobile
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            touchStartX = touch.clientX - rect.left;
            touchStartY = touch.clientY - rect.top;
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            const rect = canvas.getBoundingClientRect();
            const touchEndX = touch.clientX - rect.left;
            const touchEndY = touch.clientY - rect.top;

            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                moveFish(deltaX > 0 ? 'right' : 'left');
            } else {
                moveFish(deltaY > 0 ? 'down' : 'up');
            }
        });

        // Initialize and start game
        initEmotions();
        initBubbles();
        initSeaweed();
        updateUI();
        update();
    </script>
</body>
</html>
