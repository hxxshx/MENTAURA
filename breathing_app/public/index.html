<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Breathe With Me</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #e8d5ff 0%, #f5d0fe 30%, #f0abfc 60%, #ddd6fe 100%);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
      position: relative;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(232, 213, 255, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(240, 171, 252, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 80%, rgba(221, 214, 254, 0.3) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      padding: 28px;
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 60px rgba(147, 51, 234, 0.1), 0 8px 25px rgba(147, 51, 234, 0.08);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    h2 {
      margin-top: 0;
      background: linear-gradient(135deg, #9333ea, #ec4899, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 28px;
      margin-bottom: 20px;
      font-weight: 700;
    }
    
    #circle {
      width: 180px;
      height: 180px;
      margin: 25px auto;
      border-radius: 50%;
      background: linear-gradient(135deg, #e8d5ff 0%, #f5d0fe 50%, #ddd6fe 100%);
      transform: scale(1);
      box-shadow: 
        0 20px 40px rgba(147, 51, 234, 0.2),
        0 8px 16px rgba(236, 72, 153, 0.15),
        inset 0 2px 4px rgba(255, 255, 255, 0.3);
      transition: transform 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    #circle::before {
      content: '';
      position: absolute;
      top: 20%;
      left: 20%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
      border-radius: 50%;
    }
    
    #status {
      font-size: 18px;
      font-weight: 600;
      color: #4c1d95;
      margin-bottom: 8px;
      min-height: 25px;
    }
    
    #timer {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #9333ea, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      font-family: 'Courier New', monospace;
    }
    
    .session-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin: 20px 0;
    }
    
    .stat-item {
      background: linear-gradient(135deg, rgba(232, 213, 255, 0.4), rgba(245, 208, 254, 0.4));
      backdrop-filter: blur(10px);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(147, 51, 234, 0.1);
      position: relative;
      overflow: hidden;
    }
    
    .stat-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
    }
    
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #9333ea, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .stat-label {
      font-size: 12px;
      color: #6b21a8;
      margin-top: 2px;
    }
    
    button {
      padding: 12px 20px;
      margin: 6px;
      border-radius: 12px;
      border: 0;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .primary {
      background: linear-gradient(135deg, #9333ea 0%, #ec4899 50%, #8b5cf6 100%);
      color: #fff;
      min-width: 80px;
      box-shadow: 0 8px 20px rgba(147, 51, 234, 0.3);
    }
    
    .primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s ease;
    }
    
    .primary:hover:enabled::before {
      left: 100%;
    }
    
    .primary:hover:enabled {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(147, 51, 234, 0.4);
    }
    
    .secondary {
      background: linear-gradient(135deg, rgba(232, 213, 255, 0.6), rgba(245, 208, 254, 0.6));
      backdrop-filter: blur(10px);
      color: #4c1d95;
      border: 1px solid rgba(147, 51, 234, 0.2);
    }
    
    .secondary:hover:enabled {
      background: linear-gradient(135deg, rgba(232, 213, 255, 0.8), rgba(245, 208, 254, 0.8));
      transform: translateY(-1px);
    }
    
    .pace-selector {
      margin: 20px 0;
      padding: 12px;
      background: linear-gradient(135deg, rgba(232, 213, 255, 0.4), rgba(245, 208, 254, 0.4));
      backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(147, 51, 234, 0.1);
    }
    
    .pace-selector label {
      font-weight: 600;
      color: #4c1d95;
    }
    
    .pace-selector select {
      margin-left: 8px;
      padding: 6px 10px;
      border: 1px solid rgba(147, 51, 234, 0.2);
      border-radius: 6px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(5px);
      color: #4c1d95;
    }
    
    .small {
      font-size: 13px;
      color: #6b21a8;
      margin-top: 6px;
    }
    
    .history-section {
      margin-top: 25px;
      text-align: left;
    }
    
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .history-title {
      font-weight: 600;
      color: #4c1d95;
      font-size: 16px;
    }
    
    .streak-badge {
      background: linear-gradient(135deg, #9333ea, #ec4899);
      color: white;
      padding: 4px 10px;
      border-radius: 15px;
      font-size: 12px;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(147, 51, 234, 0.3);
    }
    
    .hist-row {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      margin: 8px 0;
      background: linear-gradient(135deg, rgba(232, 213, 255, 0.3), rgba(245, 208, 254, 0.3));
      backdrop-filter: blur(5px);
      border-radius: 10px;
      border: 1px solid rgba(147, 51, 234, 0.1);
      transition: all 0.3s ease;
    }
    
    .hist-row:hover {
      background: linear-gradient(135deg, rgba(232, 213, 255, 0.5), rgba(245, 208, 254, 0.5));
      border-color: rgba(147, 51, 234, 0.2);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(147, 51, 234, 0.1);
    }
    
    .hist-left {
      flex: 1;
    }
    
    .hist-right {
      text-align: right;
    }
    
    .hist-date {
      font-weight: 600;
      color: #4c1d95;
      font-size: 14px;
    }
    
    .hist-pace {
      font-size: 12px;
      color: #6b21a8;
      margin-top: 2px;
    }
    
    .hist-duration {
      font-weight: 600;
      background: linear-gradient(135deg, #9333ea, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 14px;
    }
    
    .hist-cycles {
      font-size: 12px;
      color: #6b21a8;
      margin-top: 2px;
    }
    
    .status-success {
      color: #059669;
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(5, 150, 105, 0.1));
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    
    .status-error {
      color: #dc2626;
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(220, 38, 38, 0.1));
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    
    .status-info {
      color: #2563eb;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(37, 99, 235, 0.1));
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }
    
    .loading {
      opacity: 0.7;
      background: linear-gradient(135deg, rgba(232, 213, 255, 0.3), rgba(245, 208, 254, 0.3));
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(147, 51, 234, 0.1);
    }
    
    .empty-state {
      text-align: center;
      padding: 20px;
      color: #6b21a8;
      font-style: italic;
      background: linear-gradient(135deg, rgba(232, 213, 255, 0.3), rgba(245, 208, 254, 0.3));
      border-radius: 8px;
      border: 1px solid rgba(147, 51, 234, 0.1);
    }
    
    @media (max-width: 480px) {
      .card {
        padding: 20px;
        margin: 10px;
      }
      #circle {
        width: 150px;
        height: 150px;
      }
      .session-stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Breathe With Me</h2>
    <div id="circle" aria-hidden="true"></div>
    <div id="status">Ready to begin your breathing journey</div>
    <div id="timer">00:00</div>

    <div class="session-stats">
      <div class="stat-item">
        <div class="stat-value" id="cycleCount">0</div>
        <div class="stat-label">Cycles</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="sessionTime">0:00</div>
        <div class="stat-label">Session Time</div>
      </div>
    </div>

    <div class="pace-selector">
      <label>
        Breathing Pace:
        <select id="pace">
          <option value="3/3">3s inhale / 3s exhale</option>
          <option value="4/4" selected>4s inhale / 4s exhale</option>
          <option value="5/5">5s inhale / 5s exhale</option>
          <option value="6/6">6s inhale / 6s exhale</option>
        </select>
      </label>
    </div>

    <div style="margin-top:20px">
      <button id="startBtn" class="primary">Start Session</button>
      <button id="stopBtn" class="secondary" disabled>End Session</button>
    </div>
    
    <button id="refreshBtn" class="secondary" style="margin-top: 10px;">Refresh History</button>
    <button id="clearBtn" class="secondary" style="margin-top: 5px;">Clear History</button>

    <div class="history-section">
      <div class="history-header">
        <div class="history-title">Recent Sessions</div>
        <div class="streak-badge">🔥 <span id="streak">0</span> day streak</div>
      </div>
      <div id="history">
        <div class="loading">Loading your session history...</div>
      </div>
    </div>

    <div style="margin-top:15px; text-align: center" class="small">
      💾 Sessions automatically saved to your database
    </div>
  </div>

<script>
/* ---------- user identity (simple) ---------- */
function getUser() {
  let uid = localStorage.getItem('uid');
  let name = localStorage.getItem('uname');
  if (!uid) {
    const anon = 'user_' + Date.now().toString(36) + Math.floor(Math.random()*1000);
    uid = anon;
    name = prompt('Welcome! Enter your name for personalized tracking:', 'Mindful User') || 'Mindful User';
    localStorage.setItem('uid', uid);
    localStorage.setItem('uname', name);
  }
  return { uid, name };
}
const user = getUser();

/* ---------- UI refs ---------- */
const circle = document.getElementById('circle');
const status = document.getElementById('status');
const timerEl = document.getElementById('timer');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const paceEl = document.getElementById('pace');
const historyEl = document.getElementById('history');
const refreshBtn = document.getElementById('refreshBtn');
const clearBtn = document.getElementById('clearBtn');
const streakEl = document.getElementById('streak');
const cycleCountEl = document.getElementById('cycleCount');
const sessionTimeEl = document.getElementById('sessionTime');

/* ---------- state ---------- */
let running = false;
let startTs = 0;
let timerInterval = null;
let cycleInterval = null;
let cycles = 0;

/* ---------- utils ---------- */
function formatTime(s) {
  const mm = String(Math.floor(s/60)).padStart(2,'0');
  const ss = String(s%60).padStart(2,'0');
  return `${mm}:${ss}`;
}

function formatDuration(seconds) {
  if (seconds < 60) return `${seconds}s`;
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return secs > 0 ? `${mins}m ${secs}s` : `${mins}m`;
}

function setStatus(text, className = '') {
  status.textContent = text;
  status.className = className;
}

function updateSessionStats() {
  cycleCountEl.textContent = cycles;
  if (running && startTs) {
    const elapsed = Math.floor((Date.now() - startTs) / 1000);
    sessionTimeEl.textContent = formatTime(elapsed);
  }
}

/* ---------- breathing cycle ---------- */
function runCycle(inhaleS, exhaleS) {
  if (!running) return;
  
  circle.style.transition = `transform ${inhaleS}s ease-in-out`;
  circle.style.transform = 'scale(1.4)';
  setStatus('Breathe in slowly...', 'status-info');
  
  setTimeout(() => {
    if (!running) return;
    setStatus('Hold...', 'status-info');
    
    setTimeout(() => {
      if (!running) return;
      circle.style.transition = `transform ${exhaleS}s ease-in-out`;
      circle.style.transform = 'scale(1)';
      setStatus('Breathe out gently...', 'status-info');
      cycles++;
      updateSessionStats();
    }, 500);
  }, inhaleS * 1000);
}

/* ---------- start/stop handlers ---------- */
startBtn.addEventListener('click', () => {
  if (running) return;
  
  running = true;
  startBtn.disabled = true;
  stopBtn.disabled = false;
  cycles = 0;
  startTs = Date.now();
  
  setStatus('Preparing to start...', 'status-info');
  timerEl.textContent = '00:00';
  updateSessionStats();

  const [inhaleS, exhaleS] = paceEl.value.split('/').map(Number);

  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - startTs) / 1000);
    timerEl.textContent = formatTime(s);
    updateSessionStats();
  }, 1000);

  setTimeout(() => {
    if (!running) return;
    setStatus('Begin breathing...', 'status-info');
    runCycle(inhaleS, exhaleS);
    cycleInterval = setInterval(() => runCycle(inhaleS, exhaleS), (inhaleS + exhaleS + 0.5) * 1000);
  }, 1000);
});

stopBtn.addEventListener('click', async () => {
  if (!running) return;
  
  running = false;
  startBtn.disabled = false;
  stopBtn.disabled = true;
  clearInterval(timerInterval);
  clearInterval(cycleInterval);

  const durationSec = Math.floor((Date.now() - startTs) / 1000);
  timerEl.textContent = formatTime(durationSec);
  updateSessionStats();
  
  setStatus('Great session! Saving your progress...', 'status-info');
  circle.style.transition = 'transform 0.3s ease';
  circle.style.transform = 'scale(1)';

  try {
    const paceLabel = paceEl.options[paceEl.selectedIndex].text;
    const payload = {
      userId: user.uid,
      userName: user.name,
      gameType: 'breathing',
      durationSec,
      pace: paceLabel,
      cycles,
      date: new Date().toISOString().slice(0,10),
      timestamp: new Date().toISOString()
    };
    
    const res = await fetch('http://localhost:5500/api/session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    
    const body = await res.json();
    
    if (body.ok || body.success) {
      setStatus(`Session saved! You completed ${cycles} breathing cycles in ${formatDuration(durationSec)}.`, 'status-success');
      loadHistory();
    } else throw new Error(body.error || 'Save failed');
  } catch (err) {
    console.error('Save error:', err);
    setStatus(`Session completed! You did ${cycles} cycles in ${formatDuration(durationSec)}. Great job! 🧘‍♀️`, 'status-success');
  }
});

/* ---------- load history ---------- */
async function loadHistory() {
  historyEl.innerHTML = '<div class="loading">Loading your breathing history...</div>';
  
  try {
    const res = await fetch('http://localhost:5500/api/sessions/' + user.uid);
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    
    const docs = await res.json();
    
    if (!Array.isArray(docs) || docs.length === 0) {
      historyEl.innerHTML = '<div class="empty-state">No sessions yet. Start your first breathing session! 🧘‍♀️</div>';
      streakEl.textContent = '0';
      return;
    }

    docs.sort((a, b) => new Date(b.timestamp || b.createdAt) - new Date(a.timestamp || a.createdAt));
    
    historyEl.innerHTML = '';
    
    docs.slice(0, 8).forEach(d => {
      const sessionDate = new Date(d.timestamp || d.createdAt);
      const dateStr = sessionDate.toLocaleDateString();
      const timeStr = sessionDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      
      const row = document.createElement('div');
      row.className = 'hist-row';
      row.innerHTML = `
        <div class="hist-left">
          <div class="hist-date">${dateStr} at ${timeStr}</div>
          <div class="hist-pace">${d.pace || 'Unknown pace'}</div>
        </div>
        <div class="hist-right">
          <div class="hist-duration">${formatTime(d.durationSec || 0)}</div>
          <div class="hist-cycles">${d.cycles || 0} cycles</div>
        </div>
      `;
      historyEl.appendChild(row);
    });

    const uniqueDates = [...new Set(docs.map(x => x.date || new Date(x.timestamp || x.createdAt).toISOString().slice(0,10)))];
    uniqueDates.sort((a,b) => b.localeCompare(a));
    
    let streak = 0;
    if (uniqueDates.length > 0) {
      streak = 1;
      let prev = new Date(uniqueDates[0]);
      
      for (let i = 1; i < uniqueDates.length; i++) {
        const cur = new Date(uniqueDates[i]);
        const diffDays = Math.round((prev - cur) / (1000 * 60 * 60 * 24));
        
        if (diffDays === 1) {
          streak++;
          prev = cur;
        } else break;
      }
    }
    
    streakEl.textContent = String(streak);
    
  } catch (err) {
    console.error('Load error:', err);
    historyEl.innerHTML = '<div class="empty-state">No previous sessions found. Complete a session to see your history! 🌟</div>';
    streakEl.textContent = '0';
  }
}

/* ---------- clear history ---------- */
clearBtn.addEventListener('click', async () => {
  if (!confirm('Are you sure you want to clear all your breathing history?')) return;

  setStatus('Clearing your session history...', 'status-info');

  try {
    const res = await fetch('http://localhost:5500/api/sessions/' + user.uid, {
      method: 'DELETE'
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    
    const body = await res.json();
    
    if (body.ok || body.success) {
      setStatus('✅ All session history cleared!', 'status-success');
      historyEl.innerHTML = '<div class="empty-state">No sessions yet. Start your first breathing session! 🧘‍♀️</div>';
      streakEl.textContent = '0';
    } else throw new Error(body.error || 'Failed to clear history');
  } catch (err) {
    console.error('Clear history error:', err);
    setStatus('❌ Could not clear history. Try again later.', 'status-error');
  }
});

/* ---------- event listeners ---------- */
refreshBtn.addEventListener('click', loadHistory);
document.addEventListener('DOMContentLoaded', loadHistory);
updateSessionStats();
</script>
</body>
</html>
